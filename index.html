<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Black Catcher - Asistente Virtual</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --black: #0A0A0A;
    --dark: #141414;
    --card: #1E1E1E;
    --border: #2A2A2A;
    --white: #F5F5F5;
    --mid: #888;
    --accent: #FF2020;
    --accent-dark: #CC0000;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--black);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .container {
    width: 100%;
    max-width: 440px;
    background: var(--dark);
    border-radius: 24px;
    border: 1px solid var(--border);
    box-shadow: 0 0 60px rgba(255,32,32,0.08);
    display: flex;
    flex-direction: column;
    height: 85vh;
    max-height: 700px;
    overflow: hidden;
  }

  .header {
    padding: 18px 20px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--dark);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 46px;
    height: 46px;
    background: var(--accent);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-text {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    color: var(--white);
    letter-spacing: 1px;
  }

  .header-info { flex: 1; }

  .header-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--white);
    letter-spacing: 2px;
  }

  .header-status {
    font-size: 11px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
    font-weight: 500;
  }

  .status-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 18px 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 3px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex;
    flex-direction: column;
    max-width: 82%;
    animation: fadeUp 0.3s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.bot { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 11px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
  }

  .message.user .bubble {
    background: var(--accent);
    color: var(--white);
    font-weight: 500;
    border-bottom-right-radius: 4px;
  }

  .message.bot .bubble {
    background: var(--card);
    color: var(--white);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-time {
    font-size: 10px;
    color: var(--mid);
    margin-top: 4px;
    padding: 0 4px;
  }

  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .typing span {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: typing 1.2s infinite;
  }

  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  .quick-replies {
    padding: 0 18px 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .quick-btn {
    padding: 7px 13px;
    background: transparent;
    border: 1px solid var(--accent);
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    color: var(--accent);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .quick-btn:hover {
    background: var(--accent);
    color: var(--white);
  }

  .input-area {
    padding: 12px 18px 16px;
    border-top: 1px solid var(--border);
    background: var(--dark);
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .input-wrap {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    transition: border-color 0.2s;
  }

  .input-wrap:focus-within { border-color: var(--accent); }

  #userInput {
    border: none;
    outline: none;
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--white);
    width: 100%;
    resize: none;
    max-height: 80px;
  }

  #userInput::placeholder { color: var(--mid); }

  .send-btn {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border: none;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .send-btn:hover { background: var(--accent-dark); transform: scale(1.05); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

  .send-btn svg { width: 18px; height: 18px; fill: var(--white); }

  .powered {
    text-align: center;
    font-size: 10px;
    color: var(--mid);
    padding-bottom: 6px;
    letter-spacing: 0.3px;
  }

  .powered span { color: var(--accent); font-weight: 500; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo">
      <div class="logo-text">BC</div>
    </div>
    <div class="header-info">
      <div class="header-name">BLACK CATCHER</div>
      <div class="header-status">
        <div class="status-dot"></div>
        Asistente online
      </div>
    </div>
  </div>

  <div class="messages" id="messages"></div>

  <div class="quick-replies" id="quickReplies">
    <button class="quick-btn" onclick="sendQuick('¿Qué productos tienen?')">👕 Productos</button>
    <button class="quick-btn" onclick="sendQuick('¿Cuánto demora mi pedido?')">⏱️ Tiempos</button>
    <button class="quick-btn" onclick="sendQuick('¿Tienen todas las tallas?')">📏 Tallas</button>
    <button class="quick-btn" onclick="sendQuick('¿Cómo hago un pedido?')">🛒 Pedir</button>
  </div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea id="userInput" placeholder="Escríbenos lo que necesitas..." rows="1" onkeydown="handleKey(event)"></textarea>
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="powered">Powered by <span>AutomatizaYA</span> · Manizales 🇨🇴</div>
</div>

<script>
const SYSTEM_PROMPT = `Eres el asistente virtual de Black Catcher, una tienda de ropa deportiva en Manizales, Colombia. Habla de manera cercana, juvenil y energética — como un amigo que conoce la tienda por dentro.

INFORMACIÓN DEL NEGOCIO:
- Nombre: Black Catcher
- Tipo: Ropa deportiva personalizada
- Ubicación: Barrio La Estrella, Cl. 61 #27c-19, Manizales
- Horario: Lunes a Sábado, 9AM a 6PM
- WhatsApp: 3145670000
- Instagram: @SEBAS313

PRODUCTOS Y PRECIOS:
- Camisetas compresivas: $75.000 COP
- Cargos (tops deportivos): $100.000 COP
- Sudaderas: $80.000 COP
- Pantalonetas: $60.000 COP
- Todos los productos se hacen con el diseño que el cliente desee

PREGUNTAS FRECUENTES:
- Tallas: Manejamos todas las tallas disponibles
- Colores: El color que el cliente quiera, totalmente personalizable
- Demora de pedidos: De 3 a 4 días hábiles después de confirmar el pedido

INSTRUCCIONES:
- Habla de manera cercana y juvenil, usa "parce", "listo", "dale" ocasionalmente
- Usa emojis deportivos frecuentemente
- Si quieren hacer un pedido, diles que escriban al WhatsApp 3145670000
- Máximo 3-4 líneas por respuesta, sé directo
- Si no sabes algo, manda al WhatsApp`;

const conversationHistory = [];

function getTime() {
  return new Date().toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
}

function addMessage(text, role) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `message ${role}`;
  div.innerHTML = `<div class="bubble">${text}</div><div class="msg-time">${getTime()}</div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function showTyping() {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message bot';
  div.id = 'typing';
  div.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
  document.getElementById('quickReplies').style.display = 'none';
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  input.value = '';

  addMessage(text, 'user');
  conversationHistory.push({ role: 'user', content: text });
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    const data = await response.json();
    const reply = data.content?.[0]?.text || 'Parce, hubo un error. Escríbenos al WhatsApp 3145670000!';

    removeTyping();
    addMessage(reply, 'bot');
    conversationHistory.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    addMessage('Parce, algo falló por acá. Escríbenos directo al WhatsApp 3145670000 💪', 'bot');
  }

  sendBtn.disabled = false;
  input.focus();
}

setTimeout(() => {
  addMessage('¡Qué más parce! 👊 Bienvenido a <strong>Black Catcher</strong>, tu tienda de ropa deportiva en Manizales. ¿En qué te puedo ayudar hoy? 💪', 'bot');
}, 500);
</script>
</body>
</html>
